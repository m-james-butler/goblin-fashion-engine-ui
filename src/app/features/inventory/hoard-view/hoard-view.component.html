<div class="hoard-view">
  @if (isLoading) {
    <div class="state-container gfe-surface-card">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Loading shinies...</p>
    </div>
  } @else if (errorMessage) {
    <div class="state-container error gfe-surface-card">
      <h2>Hoard unavailable</h2>
      <p>{{ errorMessage }}</p>
    </div>
  } @else {
    <div class="table-header">
      <h1>Hoard View</h1>
      <div class="header-actions">
        <p>{{ filteredShinies.length }} shinies</p>
        <button
          type="button"
          class="add-shiny-button gfe-btn gfe-btn-primary"
          (click)="openAddShinyModal()"
        >
          Add Shiny
        </button>
      </div>
    </div>

    @if (shinies.length === 0) {
      <p>No shinies found in the current hoard.</p>
    } @else {
      <app-hoard-filters
        [filters]="filters"
        [categoryOptions]="categoryOptions"
        [contextOptions]="contextOptions"
        [statusOptions]="statusOptions"
        [colorOptions]="colorOptions"
        [searchQuery]="searchQuery"
        (filterChanged)="applyFilterSelection($event.filter, $event.value)"
        (searchQueryChanged)="updateSearchQuery($event)"
      ></app-hoard-filters>

      <app-hoard-inventory-grid
        [shinies]="filteredShinies"
        (sortChanged)="applySortOrder($event)"
        (viewRequested)="openDetailModal($event)"
        (editRequested)="editShinyFromActions($event)"
        (deleteRequested)="deleteShinyFromActions($event)"
      ></app-hoard-inventory-grid>

      <app-shiny-detail-modal
        [shiny]="selectedShiny"
        [selectedImagePath]="selectedImagePath"
        [selectedImageAlt]="selectedImageAlt"
        [modalTitle]="getModalTitle(selectedShiny)"
        [detailEntries]="getDetailEntries(selectedShiny)"
        [deleteErrorMessage]="deleteErrorMessage"
        [isDeletingShiny]="isDeletingShiny"
        [colorPresentation]="getColorPresentation(selectedShiny?.colorPrimary)"
        (closed)="closeImageModal()"
        (editRequested)="openEditFromDetailModal()"
        (deleteRequested)="deleteSelectedShiny()"
      ></app-shiny-detail-modal>

    }

    <app-shiny-editor-modal
      [isOpen]="isAddModalOpen"
      title="Add Shiny"
      submitLabel="Save Shiny"
      closeAriaLabel="Close add shiny modal"
      fieldIdPrefix="create-shiny"
      [isSubmitting]="isSubmittingNewShiny"
      [errorMessage]="addErrorMessage"
      [form]="newShinyForm"
      [categoryValues]="categoryValues"
      [layerValues]="layerValues"
      [contextValues]="contextValues"
      [formalityValues]="formalityValues"
      [attentionValues]="attentionValues"
      [colorValues]="colorValues"
      [patternValues]="patternValues"
      [engineInclusionPolicyValues]="engineInclusionPolicyValues"
      [statusValues]="statusValues"
      (closed)="closeAddShinyModal()"
      (saved)="submitNewShiny()"
    ></app-shiny-editor-modal>

    <app-shiny-editor-modal
      [isOpen]="isEditModalOpen"
      title="Edit Shiny"
      submitLabel="Save Changes"
      closeAriaLabel="Close edit shiny modal"
      fieldIdPrefix="edit-shiny"
      [isSubmitting]="isSubmittingEditShiny"
      [errorMessage]="editErrorMessage"
      [form]="editShinyForm"
      [categoryValues]="categoryValues"
      [layerValues]="layerValues"
      [contextValues]="contextValues"
      [formalityValues]="formalityValues"
      [attentionValues]="attentionValues"
      [colorValues]="colorValues"
      [patternValues]="patternValues"
      [engineInclusionPolicyValues]="engineInclusionPolicyValues"
      [statusValues]="statusValues"
      (closed)="closeEditShinyModal()"
      (saved)="submitEditedShiny()"
    ></app-shiny-editor-modal>
  }
</div>
