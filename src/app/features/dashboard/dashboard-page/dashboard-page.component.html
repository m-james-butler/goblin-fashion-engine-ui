<p>dashboard-page works!</p>
@if (user$ | async; as user) {
  <p>Signed in as: {{ user.email ?? user.displayName ?? user.uid }}</p>
} @else {
  <p>Not signed in.</p>
}
<button type="button" (click)="signInWithDemoAccount()">Login</button>
<button type="button" (click)="signOutCurrentSession()">Logout</button>
